<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
    <meta name="google-signin-client_id" content="YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com">
</head>
<body>

<div class="container">

    <div class="left-panel">
        <h1>Hello, Welcome!</h1>
        <p><b>Don't have an account?</b></p>
        <a href="signup.html">
            <button class="switch-btn">Create Account</button>
        </a>
    </div>

    <div class="right-panel">
        <form id="loginForm">
            <h1>Login</h1>
            <div id="message"></div>
            <input type="email" name="email" id="email" placeholder="Email" required>
            <input type="password" name="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <div class="google-btn-container">
                <div class="g_id_onload"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleGoogleSignIn"
                     data-auto_prompt="false">
                </div>
                <div class="g_id_signin"
                     data-type="standard"
                     data-shape="rectangular"
                     data-theme="outline"
                     data-text="signin_with"
                     data-size="large"
                     data-logo_alignment="left">
                </div>
            </div>
        </form>
    </div>

</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim().toLowerCase();
        const password = document.getElementById('password').value.trim();
        const messageDiv = document.getElementById('message');
        
        if (!email || !password) {
            messageDiv.innerHTML = '<p class="error">All fields are required</p>';
            return;
        }

        try {
            const response = await fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    email: email,
                    password: password
                })
            });

            const data = await response.json();

            if (!response.ok || !data.success) {
                messageDiv.innerHTML = `<p class="error">${data.message || 'Login failed'}</p>`;
                return;
            }

            localStorage.setItem('currentUser', JSON.stringify({
                fullname: data.fullname,
                email: email,
                credits: typeof data.credits === 'number' ? data.credits : 100
            }));
            sessionStorage.setItem('username', data.fullname);
            
            messageDiv.innerHTML = '<p class="success">Login successful! Redirecting...</p>';
            setTimeout(function() {
                window.location.href = 'dashboard.html';
            }, 1200);
        } catch (error) {
            messageDiv.innerHTML = '<p class="error">Cannot connect to server. Run: python app.py</p>';
        }
    });

    // Google Sign-In callback
    function handleGoogleSignIn(response) {
        const messageDiv = document.getElementById('message');
        
        // Decode the JWT token to get user info
        const payload = JSON.parse(atob(response.credential.split('.')[1]));
        
        const googleEmail = 'google_' + payload.email;
        const fullName = payload.name;
        
        // Store current user
        localStorage.setItem('currentUser', JSON.stringify({
            fullname: fullName,
            email: payload.email
        }));
        sessionStorage.setItem('username', fullName);
        
        messageDiv.innerHTML = '<p class="success">Google login successful! Redirecting...</p>';
        
        // Redirect to dashboard
        setTimeout(function() {
            window.location.href = 'dashboard.html';
        }, 1500);
    }
</script>

</body>
</html>
