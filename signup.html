<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="right-panel">
        <form id="signupForm">
            <h1>Create Account</h1>
            <div id="message"></div>
            <input type="text" name="fullname" id="fullname" placeholder="Full Name" required>
            <input type="email" name="email" id="email" placeholder="Email" required>
            <input type="password" name="password" id="password" placeholder="Password" required>
            <button type="submit">Sign Up</button>
        </form>
    </div>

    <div class="left-panel">
        <h1>Welcome Back!</h1>
        <p>Already have an account?</p>
        <a href="login.html">
            <button class="switch-btn">Login</button>
        </a>
    </div>

</div>

<script>
    document.getElementById('signupForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const fullname = document.getElementById('fullname').value.trim();
        const email = document.getElementById('email').value.trim().toLowerCase();
        const password = document.getElementById('password').value.trim();
        const messageDiv = document.getElementById('message');
        
        // Validation
        if (!fullname || !email || !password) {
            messageDiv.innerHTML = '<p class="error">All fields are required</p>';
            return;
        }
        
        if (password.length < 6) {
            messageDiv.innerHTML = '<p class="error">Password must be at least 6 characters</p>';
            return;
        }

        try {
            const response = await fetch('/signup', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    fullname: fullname,
                    email: email,
                    password: password
                })
            });

            const data = await response.json();

            if (!response.ok || !data.success) {
                messageDiv.innerHTML = `<p class="error">${data.message || 'Signup failed'}</p>`;
                return;
            }

            messageDiv.innerHTML = '<p class="success">Account created! Redirecting to login...</p>';
            setTimeout(function() {
                window.location.href = 'login.html';
            }, 1200);
        } catch (error) {
            messageDiv.innerHTML = '<p class="error">Cannot connect to server. Run: python app.py</p>';
        }
    });
</script>

</body>
</html>
